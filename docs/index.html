<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>termus</title>
  <meta name="description" content="Terminal music player that generates ambient, jazz, lofi, classical, and more in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing">
  <header class="hero">
    <h1 class="logo">termus</h1>
    <p class="tagline">terminal music, generated from scratch</p>
  </header>

  <div class="wave-wrap" aria-label="Animated Braille oscilloscope">
    <pre id="brailleScope" class="braille-scope" aria-hidden="true"></pre>
  </div>

  <main>
    <pre class="install"><code>brew tap mrbrutti/termus &amp;&amp; brew install termus</code></pre>

    <nav class="links">
      <a href="docs.html">docs</a>
      <span class="sep">·</span>
      <a href="https://github.com/mrbrutti/termus">source</a>
      <span class="sep">·</span>
      <a href="https://github.com/mrbrutti/termus/releases">v0.1.0</a>
    </nav>
  </main>

  <script>
    (function () {
      // Render an animated Braille oscilloscope — same trick the TUI uses:
      // a 2-dot-wide by 4-dot-tall sub-pixel grid mapped onto Unicode Braille
      // characters (U+2800 base + bitmask). Each row of <span>s gets its own
      // gradient color, top→bottom indigo→cyan→indigo, mirroring the
      // app's default theme.
      var pre = document.getElementById('brailleScope');

      // Bit positions within a single Braille cell, by (dx, dy):
      //   (0,0)=0x01  (1,0)=0x08
      //   (0,1)=0x02  (1,1)=0x10
      //   (0,2)=0x04  (1,2)=0x20
      //   (0,3)=0x40  (1,3)=0x80
      var BITS = [
        [0x01, 0x08],
        [0x02, 0x10],
        [0x04, 0x20],
        [0x40, 0x80]
      ];

      function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
      function hex2(n) { var s = n.toString(16); return s.length < 2 ? '0' + s : s; }

      // Triangle gradient from edge to center and back: edges = indigo,
      // center = cyan. Matches the app's themes.go vertical gradient.
      function colorAt(row, total) {
        var mid = (total - 1) / 2;
        var norm = mid > 0 ? Math.abs(row - mid) / mid : 0;
        var r = lerp(0x5b, 0x5b, norm);
        var g = lerp(0xfa, 0x4b, norm);
        var b = lerp(0xff, 0xff, norm);
        return '#' + hex2(r) + hex2(g) + hex2(b);
      }

      var W = 0;    // cells wide
      var H = 12;   // cells tall
      var samples;  // ring buffer of recent "audio" sample values in [-1, 1]
      var rowSpans = [];

      // Streaming-audio state: instead of a closed-form spatial function
      // (which morphs in place and looks mathematical), we generate one or
      // two new "samples" per frame and scroll the buffer left. This makes
      // the wave look like a real oscilloscope — the most recent audio is
      // on the right and history scrolls off the left, the way a real scope
      // shows incoming signal over time.
      var time = 0;
      var transientLeft = 0;
      var transientAmp = 0;

      function nextSample() {
        time += 1;

        // Slow amplitude envelope — a "breathing" loudness curve that
        // imitates the natural ebb of musical phrases. Half-wave rectified
        // so we get sustain → silence → sustain rather than constant motion.
        var beatPhase = Math.sin(time * 0.013);
        var envelope = 0.35 + 0.55 * Math.max(0, beatPhase);

        // Three "voices" at incommensurate ratios, with slow pitch drift
        // (frequencies themselves wobble) — gives the wave a melodic
        // character that changes over time without being periodic.
        var pitchDrift = 0.04 * Math.sin(time * 0.0009);
        var f1 = 0.36 + pitchDrift;
        var v =
            0.55 * Math.sin(time * f1)
          + 0.30 * Math.sin(time * f1 * 2.13)
          + 0.15 * Math.sin(time * f1 * 4.07);
        v *= envelope;

        // Subtle high-frequency texture — micro-variation that makes the
        // wave look like real audio rather than a smooth math curve.
        v += (Math.random() - 0.5) * 0.05;

        // Occasional transients (drum-hit-like spikes). Lasts ~25 samples
        // with exponential decay so it briefly punches the wave then settles.
        if (transientLeft > 0) {
          v += transientAmp * (transientLeft / 25);
          transientLeft -= 1;
        } else if (Math.random() < 0.005) {
          transientLeft = 25;
          transientAmp = (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 0.6);
        }

        if (v < -1) v = -1;
        if (v >  1) v =  1;
        return v;
      }

      function buildRows() {
        while (pre.firstChild) pre.removeChild(pre.firstChild);
        rowSpans = [];
        for (var cy = 0; cy < H; cy++) {
          var span = document.createElement('span');
          span.style.color = colorAt(cy, H);
          span.style.display = 'block';
          rowSpans.push(span);
          pre.appendChild(span);
        }
      }

      function resizeBuffer(newDotsX) {
        var fresh = new Float32Array(newDotsX);
        if (samples) {
          // Keep the most-recent values when buffer grows/shrinks.
          var copyN = Math.min(samples.length, newDotsX);
          for (var i = 0; i < copyN; i++) {
            fresh[newDotsX - 1 - i] = samples[samples.length - 1 - i];
          }
        }
        samples = fresh;
      }

      function measure() {
        var rect = pre.getBoundingClientRect();
        var probe = document.createElement('span');
        probe.textContent = '⠿';
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.font = window.getComputedStyle(pre).font;
        document.body.appendChild(probe);
        var cw = probe.getBoundingClientRect().width || 10;
        document.body.removeChild(probe);
        W = Math.max(20, Math.floor(rect.width / cw));
        resizeBuffer(W * 2);
        buildRows();
      }

      // Scroll speed: generate this many new samples per frame. Higher =
      // wave scrolls left faster. 3 feels close to the actual TUI's
      // perceived scroll speed at 44.1 kHz and ~30 fps.
      var SAMPLES_PER_FRAME = 3;

      function frame() {
        // Push new samples into the ring buffer.
        for (var i = 0; i < SAMPLES_PER_FRAME; i++) {
          // Shift left by 1.
          samples.copyWithin(0, 1);
          samples[samples.length - 1] = nextSample();
        }

        var dotsX = W * 2;
        var dotsY = H * 4;
        var mid = dotsY / 2;
        var amp = dotsY * 0.45;

        // Convert each sample to a dot-row index, then OR the dot bits into
        // the right Braille cell.
        for (var cy = 0; cy < H; cy++) {
          var chars = '';
          for (var cx = 0; cx < W; cx++) {
            var bits = 0;
            for (var dx = 0; dx < 2; dx++) {
              var px = cx * 2 + dx;
              var v = samples[px];
              var y = mid + amp * v;
              if (y < 0) y = 0;
              if (y > dotsY - 1) y = dotsY - 1;
              var py = y | 0;
              var rel = py - cy * 4;
              if (rel >= 0 && rel < 4) bits |= BITS[rel][dx];
            }
            chars += String.fromCharCode(0x2800 + bits);
          }
          rowSpans[cy].textContent = chars;
        }
      }

      function tick() {
        frame();
        requestAnimationFrame(tick);
      }

      function init() {
        measure();
        if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          frame();
        } else {
          tick();
        }
      }

      window.addEventListener('resize', measure);

      // Wait for the webfont (Space Grotesk) so initial layout doesn't jump.
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
