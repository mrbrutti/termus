<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>termus</title>
  <meta name="description" content="Terminal music player that generates ambient, jazz, lofi, classical, and more in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing">
  <header class="hero">
    <h1 class="logo">termus</h1>
    <p class="tagline">terminal music, generated from scratch</p>
  </header>

  <div class="wave-wrap">
    <svg id="waveSvg" class="wave" role="img"
         aria-label="An animated wave illustrating termus's oscilloscope output"
         preserveAspectRatio="none">
      <defs>
        <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#5b4bff"/>
          <stop offset="50%"  stop-color="#5bfaff"/>
          <stop offset="100%" stop-color="#5b4bff"/>
        </linearGradient>
        <filter id="waveGlow" x="-5%" y="-30%" width="110%" height="160%">
          <feGaussianBlur stdDeviation="1.2"/>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path id="wavePath"
            stroke="url(#waveGrad)"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            filter="url(#waveGlow)"
            vector-effect="non-scaling-stroke"/>
    </svg>
  </div>

  <main>
    <pre class="install"><code>brew tap mrbrutti/termus &amp;&amp; brew install termus</code></pre>

    <nav class="links">
      <a href="docs.html">docs</a>
      <span class="sep">·</span>
      <a href="https://github.com/mrbrutti/termus">source</a>
      <span class="sep">·</span>
      <a href="https://github.com/mrbrutti/termus/releases">v0.1.0</a>
    </nav>
  </main>

  <script>
    (function () {
      var svg  = document.getElementById('waveSvg');
      var path = document.getElementById('wavePath');
      var H    = 260;
      var t    = 0;

      function renderAt(width, time) {
        var mid = H / 2;
        var d   = 'M 0 ' + mid.toFixed(1);
        for (var x = 0; x <= width; x += 3) {
          var y = mid
            + 70 * Math.sin(0.018 * x + time * 0.0140)
            + 28 * Math.sin(0.047 * x + time * 0.0260)
            + 12 * Math.sin(0.103 * x + time * 0.0090);
          d += ' L ' + x + ' ' + y.toFixed(1);
        }
        path.setAttribute('d', d);
      }

      function fit() {
        var w = Math.max(320, svg.clientWidth | 0);
        svg.setAttribute('viewBox', '0 0 ' + w + ' ' + H);
      }

      function frame() {
        var w = Math.max(320, svg.clientWidth | 0);
        renderAt(w, t);
        t += 1;
        requestAnimationFrame(frame);
      }

      fit();
      window.addEventListener('resize', fit);
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        renderAt(Math.max(320, svg.clientWidth | 0), 0);
      } else {
        frame();
      }
    })();
  </script>
</body>
</html>
