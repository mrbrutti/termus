<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>termus</title>
  <meta name="description" content="Terminal music player that generates ambient, jazz, lofi, classical, and more in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing">
  <main>
    <h1 class="logo">termus</h1>
    <p class="tagline">terminal music, generated from scratch</p>

    <svg class="wave" viewBox="0 0 1200 280" role="img"
         aria-label="An animated wave illustrating termus's oscilloscope output"
         preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#5b4bff"/>
          <stop offset="50%"  stop-color="#5bfaff"/>
          <stop offset="100%" stop-color="#5b4bff"/>
        </linearGradient>
        <filter id="waveGlow" x="-5%" y="-30%" width="110%" height="160%">
          <feGaussianBlur stdDeviation="1.2"/>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path id="wavePath"
            stroke="url(#waveGrad)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-dasharray="0 6"
            fill="none"
            filter="url(#waveGlow)"/>
    </svg>
    <script>
      (function () {
        var path = document.getElementById('wavePath');
        var t = 0;
        var mid = 140;
        function frame() {
          // Three sine components at incommensurate frequencies + slow phase
          // drift produces an audio-like wave that never quite repeats.
          var d = 'M 0 ' + mid.toFixed(1);
          for (var x = 0; x <= 1200; x += 4) {
            var y = mid
              + 70 * Math.sin(0.018 * x + t * 0.0140)
              + 28 * Math.sin(0.047 * x + t * 0.0260)
              + 12 * Math.sin(0.103 * x + t * 0.0090);
            d += ' L ' + x + ' ' + y.toFixed(1);
          }
          path.setAttribute('d', d);
          t += 1;
          requestAnimationFrame(frame);
        }
        // Respect users who prefer reduced motion — show a still wave instead
        // of animating.
        if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          var still = 'M 0 ' + mid;
          for (var x = 0; x <= 1200; x += 4) {
            var y = mid + 70 * Math.sin(0.018 * x) + 28 * Math.sin(0.047 * x) + 12 * Math.sin(0.103 * x);
            still += ' L ' + x + ' ' + y.toFixed(1);
          }
          path.setAttribute('d', still);
        } else {
          frame();
        }
      })();
    </script>

    <pre class="install"><code>brew tap mrbrutti/termus &amp;&amp; brew install termus</code></pre>

    <nav class="links">
      <a href="docs.html">docs</a>
      <span class="sep">·</span>
      <a href="https://github.com/mrbrutti/termus">source</a>
      <span class="sep">·</span>
      <a href="https://github.com/mrbrutti/termus/releases">v0.1.0</a>
    </nav>
  </main>
</body>
</html>
